name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop


  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
     runs-on: ubuntu-latest


     steps:
       - name: Checkout repository
         uses: actions/checkout@v3

       - name: Print branch name
         run: |
           echo "CI Pipeline is running"
           echo "Branch: ${{ github.ref }}" 
